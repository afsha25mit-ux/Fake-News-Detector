<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>📰 Fake News Detector</h1>

    <form method="POST">
        <textarea name="news" placeholder="Enter news here..." required></textarea><br><br>
        <button type="submit">Check News</button>
    </form>

    {% if prediction %}
        <h2>{{ prediction }}</h2>
    {% endif %}

</body>
</html>
